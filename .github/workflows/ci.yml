name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile app/main.py
          python -m py_compile app/config.py
          find app/ -name "*.py" -exec python -m py_compile {} +

      - name: Check for common issues
        run: |
          cd backend
          # Ensure no .env files are committed
          if [ -f .env ]; then echo "ERROR: .env file committed!"; exit 1; fi
          # Ensure migrations are sequentially numbered
          ls migrations/*.sql | sort | head -5

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zunkiree-search-api:test ./backend
