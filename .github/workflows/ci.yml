name: CI

on:
  pull_request:
    branches: [main, stage]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Lint with ruff
        run: cd backend && ruff check app/

      - name: Check Python syntax (all files)
        run: find backend/app/ -name "*.py" -exec python -m py_compile {} +

      - name: Verify imports resolve
        env:
          # Dummy values so Pydantic Settings doesn't fail during import
          OPENAI_API_KEY: "sk-test"
          PINECONE_API_KEY: "test"
          PINECONE_HOST: "https://test.svc.pinecone.io"
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          API_SECRET_KEY: "test"
        run: |
          cd backend
          python -c "
          import importlib, pkgutil, app
          for importer, modname, ispkg in pkgutil.walk_packages(app.__path__, 'app.'):
              try:
                  importlib.import_module(modname)
              except Exception as e:
                  print(f'FAIL: {modname}: {e}')
                  exit(1)
          print('All imports OK')
          "

      - name: Run backend tests
        env:
          OPENAI_API_KEY: "sk-test"
          PINECONE_API_KEY: "test"
          PINECONE_HOST: "https://test.svc.pinecone.io"
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          API_SECRET_KEY: "test"
        run: |
          cd backend
          pytest tests/ -v

      - name: Check no .env committed
        run: |
          if [ -f backend/.env ]; then echo "ERROR: .env file committed!"; exit 1; fi

  widget-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Install dependencies
        run: cd widget && npm ci

      - name: Build widget
        run: cd widget && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zunkiree-search-api:${{ github.sha }} ./backend
