# Branch flow:
#   feature/* → PR → stage → deploy-staging.yml → staging-api.zunkireelabs.com
#   stage → fast-forward → main → deploy.yml → api.zunkireelabs.com
#
# Single-DB scope (until Phase C):
#   Both stage and prod containers share the same Supabase project (Mumbai,
#   qzgcowcrtggmttfczbdo). Migrations merged to stage run against shared
#   prod DB. Stage = code-preview, NOT data-isolation. Discipline: every
#   migration must be additive / reversible by construction.

name: Deploy to Staging

on:
  push:
    branches: [stage]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'scripts/**'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Skip database migrations"
        required: false
        default: "false"

# Prevent concurrent staging deploys
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    permissions:
      contents: read
      packages: write

  deploy:
    runs-on: ubuntu-latest
    environment: staging
    needs: release
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,SKIP_MIGRATIONS
          script: |
            set -e

            STAGE_DIR="/home/zunkireelabs/devprojects/zunkiree-search-v1-stage"

            # Self-bootstrap: clone the repo into the staging dir on first run.
            if [ ! -d "$STAGE_DIR/.git" ]; then
              echo "=== First-time staging bootstrap: cloning repo ==="
              mkdir -p "$STAGE_DIR"
              git clone https://github.com/Zunkireelabs/zunkiree-search-v1.git "$STAGE_DIR"
            fi
            cd "$STAGE_DIR"

            echo "=== Resetting staging working tree to origin/stage ==="
            # Same stateless contract as prod (deploy.yml). Anything edited
            # directly on the VPS gets blown away by the next deploy.
            # `git checkout -B stage origin/stage` is robust against the VPS
            # being on any branch.
            git fetch origin stage
            git checkout -B stage origin/stage

            # Bootstrap backend/.env.staging from prod path on first run.
            # The file is gitignored (.env* pattern), so `git clone` doesn't
            # bring it into the new staging dir. We copy it once from the
            # prod repo's path. Subsequent deploys are no-ops (file already
            # exists). Transitional — B5 will replace this with .env
            # rendering from GitHub secrets at deploy time, removing the
            # dependency on the prod path entirely.
            if [ ! -f backend/.env.staging ]; then
              PROD_STAGING_ENV="/home/zunkireelabs/devprojects/zunkiree-search-v1/backend/.env.staging"
              if [ -f "$PROD_STAGING_ENV" ]; then
                echo "=== Bootstrapping backend/.env.staging from prod path (first run) ==="
                cp "$PROD_STAGING_ENV" backend/.env.staging
              else
                echo "::error::backend/.env.staging missing from staging dir AND prod path. Cannot bootstrap. Add it manually to either path before retrying."
                exit 1
              fi
            fi

            echo "=== Logging in to GHCR ==="
            # --password-stdin avoids the password ever appearing in `ps` /
            # process listings. $GHCR_TOKEN is the workflow GITHUB_TOKEN
            # forwarded via the SSH action's `envs:` block, workflow-scoped
            # (~1h lifetime), not stored on disk.
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "=== Pulling image ghcr.io/zunkireelabs/zunkiree-search-api:$IMAGE_TAG ==="
            # Pull BEFORE migrate so an image-pull failure aborts cleanly
            # without touching the shared DB. Order: pull → migrate → restart.
            docker pull "ghcr.io/zunkireelabs/zunkiree-search-api:$IMAGE_TAG"

            echo "=== Running migrations ==="
            if [ "$SKIP_MIGRATIONS" != "true" ]; then
              # First-time bootstrap: container won't exist yet, so DB_URL
              # extraction has to fall back to reading backend/.env.staging
              # directly. Once the staging container is running, future
              # deploys read from the running container as the source of
              # truth (matches deploy.yml's pattern).
              DB_URL=$(docker compose exec -T zunkiree-search-api-stage printenv DATABASE_URL 2>/dev/null | tr -d '\r' || true)
              if [ -z "$DB_URL" ] && [ -f backend/.env.staging ]; then
                echo "Staging container not running yet — reading DATABASE_URL from backend/.env.staging for bootstrap"
                DB_URL=$(grep -E '^DATABASE_URL=' backend/.env.staging | head -1 | cut -d'=' -f2-)
              fi
              if [ -z "$DB_URL" ]; then
                echo "::error::Could not read DATABASE_URL — refusing to deploy staging code without verifying migrations ran"
                exit 1
              fi
              ./scripts/migrate.sh "$DB_URL"
            else
              echo "Skipping migrations (manual override)"
            fi

            echo "=== Restarting staging service with pulled image ==="
            # --no-build: never fall back to building on the VPS. IMAGE_TAG
            # is read by docker-compose.yml's image: directive.
            IMAGE_TAG="$IMAGE_TAG" docker compose --profile staging up -d --no-build --force-recreate zunkiree-search-api-stage

            echo "=== Verifying health ==="
            sleep 10
            for i in 1 2 3 4 5; do
              if docker exec zunkiree-search-api-stage python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null; then
                echo "Staging health check passed"
                docker logout ghcr.io || true
                exit 0
              fi
              echo "Attempt $i failed, waiting 10s..."
              sleep 10
            done
            echo "ERROR: Staging health check failed after 5 attempts"
            docker logs zunkiree-search-api-stage --tail 30
            docker logout ghcr.io || true
            exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deploy failed! Check VPS logs."
