name: Run Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm running migrations on production"
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ inputs.confirm == 'yes' }}
    steps:
      - name: Run migrations via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/zunkireelabs/devprojects/zunkiree-search-v1

            # Two-step stateless sync — matches deploy.yml:
            # 1. `git checkout -B main origin/main` switches to main regardless
            #    of which branch the VPS is on (Z1/Z2-safe; bare reset would
            #    corrupt a non-main branch pointer instead of switching).
            # 2. `git reset --hard origin/main` clobbers drift so migrate.sh
            #    always runs the committed version. Safe because step 1 already
            #    guarantees we are on main.
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main

            DB_URL=$(docker compose exec -T zunkiree-search-api printenv DATABASE_URL 2>/dev/null | tr -d '\r')
            if [ -z "$DB_URL" ]; then
              echo "::error::Could not read DATABASE_URL from container — cannot run migrations"
              exit 1
            fi
            ./scripts/migrate.sh "$DB_URL"
