name: Run Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm running migrations on production"
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ inputs.confirm == 'yes' }}
    steps:
      - name: Run migrations via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/zunkireelabs/devprojects/zunkiree-search-v1
            git pull origin main
            DB_URL=$(docker compose exec zunkiree-search-api printenv DATABASE_URL 2>/dev/null | tr -d '\r')
            if [ -z "$DB_URL" ]; then
              echo "ERROR: Could not read DATABASE_URL"
              exit 1
            fi
            ./scripts/migrate.sh "$DB_URL"
