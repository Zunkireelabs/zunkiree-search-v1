# Reusable workflow: builds the backend Docker image and pushes it to GHCR.
#
# Tag scheme (PLAN §6.3 + B3 brief §1.4):
#   - ghcr.io/zunkireelabs/zunkiree-search-api:<full-sha>   (immutable, deploys pin to this)
#   - ghcr.io/zunkireelabs/zunkiree-search-api:<branch>     (convenience pointer to latest-on-branch: main / stage)
#   - NO :latest tag                                         (too easy to mis-deploy stale code)
#
# Called from deploy.yml + deploy-staging.yml via `jobs.release.uses: ./.github/workflows/release.yml`.
# Build-once-deploy-many: deploys pull this image and restart, never rebuild on the VPS.

name: Release (build + push GHCR)

on:
  workflow_call:
    outputs:
      image:
        description: "Fully-qualified image reference pinned to the commit SHA"
        value: ${{ jobs.release.outputs.image }}
      sha_tag:
        description: "The full commit SHA used as the immutable tag"
        value: ${{ jobs.release.outputs.sha_tag }}

# Workflow_call inherits permissions from the caller. We also set them explicitly
# so a misconfigured caller still gets a token with packages:write.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zunkireelabs/zunkiree-search-api

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve branch tag
        id: branch
        run: |
          # github.ref_name on push events is the branch name (main / stage).
          # On workflow_call invoked from a push-triggered caller, ref_name
          # propagates correctly. Lowercase for registry safety.
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Expose image reference
        id: meta
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "Pushed:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}"
