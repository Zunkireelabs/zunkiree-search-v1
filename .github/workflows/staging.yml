name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy to staging"
        required: true
        default: "main"

# Only one staging deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy branch to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/zunkireelabs/devprojects/zunkiree-search-v1

            echo "=== Deploying branch: ${{ inputs.branch }} to staging ==="

            # Save current branch
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)

            # Fetch and checkout the target branch
            git fetch origin
            git checkout ${{ inputs.branch }}
            git pull origin ${{ inputs.branch }}

            echo "=== Building staging image ==="
            docker compose --profile staging build zunkiree-search-api-staging

            echo "=== Starting staging service ==="
            docker compose --profile staging up -d --force-recreate zunkiree-search-api-staging

            # Switch back to the original branch so production isn't affected
            git checkout "$CURRENT_BRANCH"

            echo "=== Verifying staging health ==="
            sleep 5
            for i in 1 2 3; do
              if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                echo "Staging health check passed"
                echo "Staging is live at: https://staging-api.zunkireelabs.com"
                exit 0
              fi
              echo "Attempt $i failed, waiting 5s..."
              sleep 5
            done
            echo "WARNING: Staging health check failed — check logs: docker logs zunkiree-search-api-staging --tail 20"
