name: Deploy to VPS

on:
  # Auto-deploy after merge to main
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'scripts/**'
  # Keep manual trigger as backup
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Skip database migrations"
        required: false
        default: "false"

# Prevent concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/zunkireelabs/devprojects/zunkiree-search-v1

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Running migrations ==="
            if [ "${{ inputs.skip_migrations }}" != "true" ]; then
              DB_URL=$(docker compose exec -T zunkiree-search-api printenv DATABASE_URL 2>/dev/null | tr -d '\r' || true)
              if [ -n "$DB_URL" ]; then
                ./scripts/migrate.sh "$DB_URL"
              else
                echo "WARNING: Could not read DATABASE_URL, skipping migrations"
              fi
            else
              echo "Skipping migrations (manual override)"
            fi

            echo "=== Building Docker image ==="
            docker compose build zunkiree-search-api

            echo "=== Restarting service ==="
            docker compose up -d --force-recreate zunkiree-search-api

            echo "=== Verifying health ==="
            sleep 5
            for i in 1 2 3; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i failed, waiting 5s..."
              sleep 5
            done
            echo "ERROR: Health check failed after 3 attempts"
            docker logs zunkiree-search-api --tail 30
            exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deploy failed! Check VPS logs."
