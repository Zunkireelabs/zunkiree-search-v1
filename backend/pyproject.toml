[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
# Start lenient: only catch real bugs, not style
# F: pyflakes (undefined vars, unused vars, redefined)
# E7: statement errors (bare except, == True comparisons)
# E9: runtime errors (syntax errors, invalid escape)
select = ["F", "E7", "E9"]
# Ignore unused imports for now (too many to fix at once)
ignore = ["F401", "F841", "E712"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
