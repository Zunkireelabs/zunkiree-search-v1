services:
  zunkiree-search-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zunkiree-search-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - backup-data:/backups
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zunkiree-search-api.rule=Host(`api.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-search-api.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-search-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.zunkiree-search-api.loadbalancer.server.port=8000"
    networks:
      - hosting

  zunkiree-ecommerce-dashboard:
    build:
      context: ./ecommerce-dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.zunkireelabs.com
    container_name: zunkiree-ecommerce-dashboard
    restart: unless-stopped
    networks:
      - hosting
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hosting"
      - "traefik.http.routers.zunkiree-ecommerce-dashboard.rule=Host(`ecommerce.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-ecommerce-dashboard.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-ecommerce-dashboard.tls=true"
      - "traefik.http.routers.zunkiree-ecommerce-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.zunkiree-ecommerce-dashboard.loadbalancer.server.port=80"

  zunkiree-backup:
    image: postgres:16-alpine
    container_name: zunkiree-backup
    restart: "no"
    env_file:
      - ./backend/.env
    volumes:
      - backup-data:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    networks:
      - hosting
    profiles:
      - backup

volumes:
  backup-data:
    driver: local

networks:
  hosting:
    external: true
