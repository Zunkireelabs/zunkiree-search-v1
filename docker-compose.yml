# Zunkiree Search — Docker Compose
# Production: docker compose up -d
# Dev:        docker compose --profile dev up
# Backup:     docker compose --profile backup run zunkiree-backup

services:
  zunkiree-search-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zunkiree-search-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - backup-data:/backups
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zunkiree-search-api.rule=Host(`api.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-search-api.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-search-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.zunkiree-search-api.loadbalancer.server.port=8000"
    networks:
      - hosting

  # Local development (no Traefik, exposes port directly)
  zunkiree-search-api-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zunkiree-search-api-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev

  # Staging (deploy any branch for testing chatbot/payments with public URL)
  zunkiree-search-api-staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zunkiree-search-api-staging
    restart: unless-stopped
    env_file:
      - ./backend/.env.staging
    environment:
      - ENVIRONMENT=staging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zunkiree-staging.rule=Host(`staging-api.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-staging.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.zunkiree-staging.loadbalancer.server.port=8000"
    networks:
      - hosting
    profiles:
      - staging

  zunkiree-backup:
    image: postgres:16-alpine
    container_name: zunkiree-backup
    restart: "no"
    env_file:
      - ./backend/.env
    volumes:
      - backup-data:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    networks:
      - hosting
    profiles:
      - backup

volumes:
  backup-data:
    driver: local

networks:
  hosting:
    external: true
