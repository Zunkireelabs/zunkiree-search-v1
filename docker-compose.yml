# Zunkiree Search — Docker Compose
# Production: docker compose up -d              (CI passes IMAGE_TAG=<sha>)
# Staging:    docker compose --profile staging up -d
# Dev:        docker compose --profile dev up   (uses build: via override file)
# Backup:     docker compose --profile backup run zunkiree-backup
#
# Image source: prod + staging services pull pre-built images from GHCR by
# SHA tag. CI builds + pushes via release.yml; deploys pull + restart, never
# rebuild on the VPS. Local dev restores `build:` via
# docker-compose.override.yml (gitignored, see docker-compose.override.yml.example).

services:
  zunkiree-search-api:
    image: ghcr.io/zunkireelabs/zunkiree-search-api:${IMAGE_TAG:?IMAGE_TAG must be set or use docker-compose.override.yml for local dev}
    container_name: zunkiree-search-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - backup-data:/backups
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zunkiree-search-api.rule=Host(`api.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-search-api.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-search-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.zunkiree-search-api.loadbalancer.server.port=8000"
    networks:
      - hosting

  # Local development (no Traefik, exposes port directly)
  zunkiree-search-api-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zunkiree-search-api-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev

  # Staging — runs the `stage` branch via deploy-staging.yml workflow.
  # Container lives at /home/zunkireelabs/devprojects/zunkiree-search-v1-stage
  # on the VPS; reads its env from backend/.env.staging in that dir.
  # Single-DB until Phase C — points at same Supabase as prod.
  zunkiree-search-api-stage:
    image: ghcr.io/zunkireelabs/zunkiree-search-api:${IMAGE_TAG:?IMAGE_TAG must be set or use docker-compose.override.yml for local dev}
    container_name: zunkiree-search-api-stage
    restart: unless-stopped
    env_file:
      - ./backend/.env.staging
    environment:
      - ENVIRONMENT=staging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zunkiree-stage.rule=Host(`staging-api.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-stage.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-stage.tls.certresolver=letsencrypt"
      - "traefik.http.services.zunkiree-stage.loadbalancer.server.port=8000"
    networks:
      - hosting
    profiles:
      - staging

  zunkiree-backup:
    image: postgres:16-alpine
    container_name: zunkiree-backup
    restart: "no"
    env_file:
      - ./backend/.env
    volumes:
      - backup-data:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    networks:
      - hosting
    profiles:
      - backup

volumes:
  backup-data:
    driver: local

networks:
  hosting:
    external: true
